name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install customtkinter pyinstaller
      
      - name: Build macOS app
        run: |
          pyinstaller \
            --windowed \
            --name "GitHubTrending" \
            --add-data "assets:assets" \
            --hidden-import customtkinter \
            --hidden-import darkdetect \
            gui_app.py
      
      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          cp -r dist/GitHubTrending.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create \
            -volname "GitHubTrending" \
            -srcfolder dist/dmg \
            -ov \
            -format UDZO \
            dist/GitHubTrending-macOS.dmg
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/GitHubTrending.app
            dist/GitHubTrending-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install customtkinter pyinstaller
      
      - name: Build Windows exe
        run: |
          pyinstaller ^
            --windowed ^
            --name "GitHubTrending" ^
            --add-data "assets;assets" ^
            --hidden-import customtkinter ^
            --hidden-import darkdetect ^
            gui_app.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/GitHubTrending.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install customtkinter pyinstaller
      
      - name: Build Linux binary
        run: |
          pyinstaller \
            --onefile \
            --name "GitHubTrending" \
            --add-data "assets:assets" \
            --hidden-import customtkinter \
            --hidden-import darkdetect \
            gui_app.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/GitHubTrending

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            macos-build/GitHubTrending-macOS.dmg
            windows-build/GitHubTrending.exe
            linux-build/GitHubTrending
          draft: false
          prerelease: false
